<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NepHR App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#508C7F">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #508C7F; font-family: sans-serif; }
        
        /* Splash Screen Style */
        #splash-screen {
            position: fixed; width: 100%; height: 100%; background: #508C7F;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 10;
        }

        .loader {
            width: 48px; height: 48px; border: 5px solid #FFF;
            border-bottom-color: transparent; border-radius: 50%;
            display: inline-block; animation: rotation 1s linear infinite;
            margin-top: 20px;
        }

        @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
        
        iframe { width: 100%; height: 100%; border: none; display: none; }

        #retry-btn {
            display: none; margin-top: 20px; padding: 12px 25px;
            background: white; color: #508C7F; border: none;
            border-radius: 25px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="icon.png" width="90" style="border-radius: 20px;">
        <div class="loader" id="loader-icon"></div>
        <p id="status-msg" style="margin-top: 20px;">Securing Connection...</p>
        <button id="retry-btn">Unlock App</button>
    </div>

    <!-- Replace with your actual Google Apps Script Web App URL -->
    <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbxuviY7LYQyFN4fJZ4_mAaYzf1pTyQ7qkFrbcSOZPt6WHJd9tX-eY2w87NOwOqMu42f/exec" allow="geolocation; camera"></iframe>

    <script>
        const frame = document.getElementById('app-frame');
        const splash = document.getElementById('splash-screen');
        const statusMsg = document.getElementById('status-msg');
        const retryBtn = document.getElementById('retry-btn');

        window.onload = () => {
            authenticate();
        };

        async function authenticate() {
            // Check if Biometric hardware is available
            if (window.PublicKeyCredential && await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()) {
                try {
                    const challenge = crypto.getRandomValues(new Uint8Array(32));
                    const options = {
                        publicKey: {
                            challenge,
                            rp: { name: "NepHR System" },
                            user: { id: new Uint8Array(16), name: "user", displayName: "NepHR User" },
                            pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                            authenticatorSelection: { userVerification: "required" },
                            timeout: 60000
                        }
                    };

                    const credential = await navigator.credentials.create(options);
                    if (credential) {
                        launchApp();
                    }
                } catch (err) {
                    statusMsg.innerText = "Authentication Failed";
                    retryBtn.style.display = "block";
                    document.getElementById('loader-icon').style.display = "none";
                }
            } else {
                // Fallback for devices without biometric support
                launchApp();
            }
        }

        retryBtn.onclick = () => {
            retryBtn.style.display = "none";
            document.getElementById('loader-icon').style.display = "inline-block";
            statusMsg.innerText = "Authenticating...";
            authenticate();
        };

        function launchApp() {
            splash.style.display = 'none';
            frame.style.display = 'block';
            
            // Notify the inner Google Apps Script app that Biometrics were successful
            setTimeout(() => {
                frame.contentWindow.postMessage({ action: 'BIOMETRIC_AUTH_SUCCESS' }, '*');
            }, 1500);
        }
    </script>
</body>
</html>
